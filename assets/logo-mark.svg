<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8bc7c"/>
      <stop offset=".5" stop-color="#c9a961"/>
      <stop offset="1" stop-color="#a3823f"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14633e"/>
      <stop offset="1" stop-color="#0a3d2a"/>
    </linearGradient>
  </defs>
  <!-- Shield outline -->
  <path d="M60 8 L108 22 L108 60 C108 84 88 104 60 114 C32 104 12 84 12 60 L12 22 Z"
