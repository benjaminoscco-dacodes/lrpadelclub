  <!-- Inner shield border -->
  <path d="M60 16 L100 27 L100 60 C100 80 84 96 60 105 C36 96 20 80 20 60 L20 27 Z"
        fill="none" stroke="url(#gold)" stroke-width="1" opacity=".55"/>
  <!-- Padel racket head (gold) -->
  <ellipse cx="55" cy="46" rx="18" ry="22" fill="none" stroke="url(#gold)" stroke-width="2.4"/>
  <!-- Racket dot pattern -->
  <g fill="url(#gold)">
    <circle cx="49" cy="38" r="1.4"/><circle cx="55" cy="38" r="1.4"/><circle cx="61" cy="38" r="1.4"/>
    <circle cx="46" cy="44" r="1.4"/><circle cx="52" cy="44" r="1.4"/><circle cx="58" cy="44" r="1.4"/><circle cx="64" cy="44" r="1.4"/>
    <circle cx="46" cy="50" r="1.4"/><circle cx="52" cy="50" r="1.4"/><circle cx="58" cy="50" r="1.4"/><circle cx="64" cy="50" r="1.4"/>
    <circle cx="49" cy="56" r="1.4"/><circle cx="55" cy="56" r="1.4"/><circle cx="61" cy="56" r="1.4"/>
  </g>
  <!-- Racket handle -->
  <rect x="53.5" y="68" width="3" height="14" rx="1.5" fill="url(#gold)"/>
  <!-- Ball -->
  <circle cx="76" cy="62" r="6" fill="#14633e" stroke="url(#gold)" stroke-width="1.4"/>
  <path d="M70 62 Q76 56 82 62" stroke="url(#gold)" stroke-width=".8" fill="none"/>
  <!-- Wave river -->
  <path d="M14 86 Q40 78 60 86 Q80 94 106 86" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <path d="M14 92 Q40 84 60 92 Q80 100 106 92" stroke="#14633e" stroke-width="1.2" fill="none" opacity=".6"/>
